<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ So sánh Hội thoại Đa Ngôn Ngữ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f8f9fa;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .lang-box {
            flex: 1 1 30%;
            min-width: 280px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .lang-box h3 {
            margin-top: 0;
            font-size: 16px;
            color: #0056b3;
            border-bottom: 2px solid #f1f3f5;
            padding-bottom: 10px;
        }
        textarea {
            width: 100%;
            height: 180px;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ced4da;
            border-radius: 4px;
            resize: vertical;
            font-family: inherit;
            line-height: 1.5;
        }
        .controls {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        .checkbox-group label {
            cursor: pointer;
            user-select: none;
            background: #e9ecef;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
        }
        .checkbox-group input:checked + label {
            background: #0056b3;
            color: white;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #218838;
        }
        .table-container {
            overflow-x: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 15px;
            text-align: left;
            vertical-align: top;
            line-height: 1.6;
        }
        th {
            background-color: #2c3e50;
            color: white;
            position: sticky;
            top: 0;
        }
        .speaker-col {
            font-weight: bold;
            color: #d35400;
            white-space: nowrap;
            width: 120px;
            text-align: center;
            background-color: #fdfefe;
        }
    </style>
</head>
<body>

    <h1>So Sánh Hội Thoại Đa Ngôn Ngữ</h1>

    <div class="controls">
        <h3 style="margin-top:0;">1. Chọn ngôn ngữ:</h3>
        <div class="checkbox-group" id="language-selectors">
            </div>
        <button onclick="generateTable()">Tạo Bảng So Sánh</button>
    </div>

    <div class="container" id="input-container">
        </div>

    <div class="table-container" id="table-container" style="display: none;">
        <table id="result-table">
            <thead>
                <tr id="table-head"></tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const languages = [
            "Tiếng Việt", "Tiếng Đức", "Tiếng Trung", "Tiếng Anh", "Tiếng Hàn", 
            "Tiếng Nhật", "Tiếng Thái", "Tiếng Pháp", "Tiếng Tây Ban Nha", 
            "Tiếng Hindi", "Tiếng Ả Rập", "Tiếng Ý", "Tiếng Nga", "Tiếng Filipino"
        ];

        function init() {
            const selectorContainer = document.getElementById('language-selectors');
            const inputContainer = document.getElementById('input-container');

            languages.forEach((lang, index) => {
                // Tạo Checkbox (Mặc định check 3 ngôn ngữ đầu tiên)
                const isChecked = index < 3 ? 'checked' : '';
                const checkboxHtml = `
                    <div>
                        <input type="checkbox" value="${lang}" class="lang-check" id="chk-${lang}" ${isChecked} style="display:none;">
                        <label for="chk-${lang}">${lang}</label>
                    </div>
                `;
                selectorContainer.insertAdjacentHTML('beforeend', checkboxHtml);

                // Tạo Textarea
                const box = document.createElement('div');
                box.className = 'lang-box';
                box.innerHTML = `
                    <h3>${lang}</h3>
                    <textarea id="text-${lang}" placeholder="Dán văn bản ${lang} vào đây..."></textarea>
                `;
                inputContainer.appendChild(box);
            });
        }

        function parseDialogue(text) {
            // Tách bằng ký tự xuống dòng thực tế
            const lines = text.split('\n');
            const result = [];
            let currentSpeaker = "";
            let currentText = "";

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;

                // Bỏ qua các dòng tiêu đề cảnh (ví dụ: Cảnh 1:, Szene 1:, 场景一：)
                if (/^(Cảnh|Szene|Scene|场景)/i.test(line)) {
                    continue;
                }

                // Nhận diện tên nhân vật: Tìm chuỗi (dưới 30 ký tự) đứng trước dấu : hoặc ：
                const match = line.match(/^([^:：]{1,30})[:：](.*)$/);
                
                if (match) {
                    // Lưu lại người nói trước đó (nếu có)
                    if (currentSpeaker) {
                        result.push({ speaker: currentSpeaker, text: currentText.trim() });
                    }
                    currentSpeaker = match[1].trim();
                    currentText = match[2].trim();
                } else {
                    // Nếu không có dấu hai chấm, nối tiếp dòng này vào câu nói hiện tại
                    if (currentSpeaker) {
                        currentText += (currentText ? " " : "") + line;
                    }
                }
            }
            // Lưu lượt nói cuối cùng
            if (currentSpeaker) {
                result.push({ speaker: currentSpeaker, text: currentText.trim() });
            }
            return result;
        }

        function generateTable() {
            const checkboxes = document.querySelectorAll('.lang-check:checked');
            const selectedLangs = Array.from(checkboxes).map(cb => cb.value);

            if (selectedLangs.length === 0) {
                alert("Vui lòng chọn ít nhất 1 ngôn ngữ!");
                return;
            }

            const parsedData = {};
            let maxTurns = 0;

            selectedLangs.forEach(lang => {
                const text = document.getElementById(`text-\${lang}`).value;
                const turns = parseDialogue(text);
                parsedData[lang] = turns;
                if (turns.length > maxTurns) {
                    maxTurns = turns.length;
                }
            });

            const thead = document.getElementById('table-head');
            thead.innerHTML = '<th class="speaker-col">Nhân Vật</th>';
            selectedLangs.forEach(lang => {
                const th = document.createElement('th');
                th.innerText = lang;
                thead.appendChild(th);
            });

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            for (let i = 0; i < maxTurns; i++) {
                const tr = document.createElement('tr');
                
                // Xác định tên nhân vật (Ưu tiên lấy từ cột ngôn ngữ đầu tiên có dữ liệu)
                let speakerName = "";
                for (let lang of selectedLangs) {
                    if (parsedData[lang][i] && parsedData[lang][i].speaker) {
                        speakerName = parsedData[lang][i].speaker;
                        break;
                    }
                }
                
                const tdSpeaker = document.createElement('td');
                tdSpeaker.className = 'speaker-col';
                tdSpeaker.innerText = speakerName;
                tr.appendChild(tdSpeaker);

                selectedLangs.forEach(lang => {
                    const td = document.createElement('td');
                    if (parsedData[lang][i]) {
                        td.innerText = parsedData[lang][i].text;
                    } else {
                        td.innerText = "-"; 
                    }
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            }

            document.getElementById('table-container').style.display = 'block';
            document.getElementById('table-container').scrollIntoView({ behavior: 'smooth' });
        }

        window.onload = init;
    </script>
</body>
</html>
